name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]" && pip install -e tools/vlabs-prm-eval
      - run: ruff check src tests tools/vlabs-prm-eval/src
      - run: pytest
      - name: clean-gate CLI smoke (accept=0 / reject=1)
        run: |
          cd tools/vlabs-prm-eval
          vlabs-prm-eval clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_new_accept.json
          if vlabs-prm-eval clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_reject_dcr.json; then exit 1; fi
      - name: build wheel
        run: pip install build && python -m build --wheel
