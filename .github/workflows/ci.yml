name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install sdk + clean-gate tool (--no-deps keeps the tool's vlabs-sdk dependency on this checkout)
        run: |
          pip install -e ".[dev]"
          pip install --no-deps -e tools/vlabs-prm-eval
      - run: ruff check src tests tools/vlabs-prm-eval/src
      - run: pytest
      - name: import smoke (wheel namespace)
        run: python -c "import vlabs_sdk; from vlabs_sdk.providers.dummy_provider import DummyProvider; from vlabs_sdk.schemas import FORMAL_CLAIM"
      - name: clean-gate CLI smoke (accept=0 / reject=1)
        run: |
          cd tools/vlabs-prm-eval
          vlabs clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_new_accept.json
          if vlabs clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_reject_dcr.json; then exit 1; fi
      - name: build wheel + sdist
        run: pip install build && python -m build
      - name: built-wheel CLI smoke in a clean venv (Option A — vlabs ships with vlabs-sdk)
        run: |
          python -m venv /tmp/wv
          /tmp/wv/bin/pip install dist/*.whl
          /tmp/wv/bin/python -c "import vlabs_sdk; import vlabs_prm_eval; from vlabs_sdk.providers.dummy_provider import DummyProvider"
          /tmp/wv/bin/vlabs --help
          cd tools/vlabs-prm-eval
          /tmp/wv/bin/vlabs clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_new_accept.json
          if /tmp/wv/bin/vlabs clean-gate --old tests/fixtures/clean/clean_old.json --new tests/fixtures/clean/clean_reject_dcr.json; then exit 1; fi
